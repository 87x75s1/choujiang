<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            min-height: 100vh;
            font-family: "微软雅黑", Arial, sans-serif;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 60px;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6a00;
        }
        .main-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: flex-start;
        }
        .draw-area {
            background: #fff8dc;
            border-radius: 10px;
            width: 600px;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
        }
        .draw-title {
            background: #e74c3c;
            color: #fff;
            width: 150px;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        /* 新增：和截图样式一致的抽奖人数按钮 */
        .count-box {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #e74c3c;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
        }
        .avatar-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .status-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }
        .hint-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }
        .btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.6;
        }
        .list-area {
            background: #fff8dc;
            border-radius: 10px;
            width: 250px;
            height: 450px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            padding: 10px;
        }
        .list-title {
            background: #e74c3c;
            color: #fff;
            text-align: center;
            padding: 5px;
            border-radius: 5px 5px 0 0;
            margin: -10px -10px 10px -10px;
        }
        .winner-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .winner-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        .winner-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>幸运大抽奖</h1>
    </div>

    <div class="main-container">
        <div class="draw-area">
            <!-- 人数信息：位置和样式已和截图对齐 -->
            <div class="count-box">当前参与抽奖：<span id="countNum">1</span> 人</div>
            <div class="draw-title">特等奖</div>
            <div class="avatar-circle" id="avatarCircle">
                <span id="statusText" class="status-text">等待抽奖</span>
            </div>
            <div class="hint-text" id="hintText">等待开始抽奖</div>
            <button class="btn" id="drawBtn">开始抽奖</button>
        </div>

        <div class="list-area">
            <div class="list-title">中奖名单</div>
            <ul class="winner-list" id="winnerList"></ul>
        </div>
    </div>

<script>
    // 抽奖人数自动增长逻辑（保持不变：1分钟从1到89）
    const countNumEl = document.getElementById('countNum');
    let currentCount = 1;
    const targetCount = 89;
    const totalDuration = 60 * 1000; // 1分钟 = 60秒
    const stepInterval = totalDuration / (targetCount - currentCount);

    const countTimer = setInterval(() => {
        currentCount++;
        countNumEl.innerText = currentCount;
        if (currentCount >= targetCount) {
            clearInterval(countTimer);
        }
    }, stepInterval);

    // 图片路径配置（关键：所有图片都在 cc/images/ 里）
    const basePath = "cc/images/";
    // 轮询图片：1.jpg ~ 39.jpg
    const rollImages = [];
    for(let i = 1; i <= 39; i++){
        rollImages.push(basePath + i + ".jpg");
    }
    // 中奖图片：和其他图片平级，也在 cc/images/ 里
    const winnerConfig = {
        name: "Li",
        image: basePath + "Li.jpg"
    };

    // 预加载图片，解决空白头像问题
    const allImageUrls = [...rollImages, winnerConfig.image];
    allImageUrls.forEach(url => {
        const img = new Image();
        img.src = url;
    });

    const avatarCircle = document.getElementById('avatarCircle');
    const statusText = document.getElementById('statusText');
    const hintText = document.getElementById('hintText');
    const drawBtn = document.getElementById('drawBtn');
    const winnerList = document.getElementById('winnerList');

    let rollTimer = null;
    let isRolling = false;

    drawBtn.onclick = function() {
        if (!isRolling) {
            isRolling = true;
            drawBtn.innerText = "停止抽奖";
            hintText.innerText = "抽奖中...";
            statusText.style.display = 'none';

            let index = 0;
            // 滚动速度：150ms，给浏览器足够时间加载图片
            rollTimer = setInterval(() => {
                index = (index + 1) % rollImages.length;
                avatarCircle.innerHTML = `<img src="${rollImages[index]}" alt="抽奖头像">`;
            }, 150);
        } else {
            isRolling = false;
            clearInterval(rollTimer);
            drawBtn.disabled = true;
            drawBtn.innerText = "抽奖完成";

            // 显示中奖者头像和名称
            avatarCircle.innerHTML = `<img src="${winnerConfig.image}" alt="中奖头像">`;
            hintText.innerText = `恭喜 ${winnerConfig.name} 中奖！`;

            // 右侧名单同步更新
            const li = document.createElement('li');
            li.className = 'winner-item';
            li.innerHTML = `<img src="${winnerConfig.image}" alt=""><span>${winnerConfig.name}</span>`;
            winnerList.prepend(li);
        }
    };
</script>
</body>
</html>
