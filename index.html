<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            min-height: 100vh;
            font-family: "微软雅黑", Arial, sans-serif;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 60px;
            color: #fff;
            text-shadow: 3px 3px 0 #ff6a00;
        }
        .main-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: flex-start;
        }
        .draw-area {
            background: #fff8dc;
            border-radius: 10px;
            width: 600px;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
        }
        .draw-title {
            background: #e74c3c;
            color: #fff;
            width: 150px;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .count-box {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #e74c3c;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
        }
        .avatar-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .status-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }
        .hint-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }
        .btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.6;
        }
        .list-area {
            background: #fff8dc;
            border-radius: 10px;
            width: 250px;
            height: 450px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            padding: 10px;
        }
        .list-title {
            background: #e74c3c;
            color: #fff;
            text-align: center;
            padding: 5px;
            border-radius: 5px 5px 0 0;
            margin: -10px -10px 10px -10px;
        }
        .winner-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .winner-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        .winner-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>幸运大抽奖</h1>
    </div>

    <div class="main-container">
        <div class="draw-area">
            <div class="count-box">当前参与抽奖：<span id="countNum">14</span> 人</div>
            <div class="draw-title">特等奖</div>
            <div class="avatar-circle" id="avatarCircle">
                <span id="statusText" class="status-text">等待抽奖</span>
            </div>
            <div class="hint-text" id="hintText">等待开始抽奖</div>
            <button class="btn" id="drawBtn">开始抽奖</button>
        </div>

        <div class="list-area">
            <div class="list-title">中奖名单</div>
            <ul class="winner-list" id="winnerList"></ul>
        </div>
    </div>

<script>
    // ========== 人数增长逻辑 ==========
    const countNumEl = document.getElementById('countNum');
    let currentCount = 14;
    const targetCount = 89;
    const growTotalTime = 60 * 1000;    // 增长总时长 60秒
    const delayStart = 10 * 1000;       // 延迟10秒再开始增长

    // 10秒后启动计数
    setTimeout(() => {
        const totalStep = targetCount - currentCount;
        const stepTime = growTotalTime / totalStep;

        const countTimer = setInterval(() => {
            currentCount++;
            countNumEl.innerText = currentCount;
            if (currentCount >= targetCount) {
                clearInterval(countTimer);
            }
        }, stepTime);
    }, delayStart);

    // ========== 图片配置 ==========
    const basePath = "cc/images/";
    const rollImages = [];
    for(let i = 1; i <= 39; i++){
        rollImages.push(basePath + i + ".jpg");
    }
    const winnerConfig = {
        name: "Li",
        image: basePath + "Li.jpg"
    };

    // 预加载图片，避免空白
    const allImageUrls = [...rollImages, winnerConfig.image];
    allImageUrls.forEach(url => {
        const img = new Image();
        img.src = url;
    });

    // ========== 抽奖逻辑 ==========
    const avatarCircle = document.getElementById('avatarCircle');
    const statusText = document.getElementById('statusText');
    const hintText = document.getElementById('hintText');
    const drawBtn = document.getElementById('drawBtn');
    const winnerList = document.getElementById('winnerList');

    let rollTimer = null;
    let isRolling = false;
    const rollSpeed = 200; // 轮播间隔 200ms，速度更慢

    drawBtn.onclick = function() {
        if (!isRolling) {
            isRolling = true;
            drawBtn.innerText = "停止抽奖";
            hintText.innerText = "抽奖中...";
            statusText.style.display = 'none';

            let index = 0;
            rollTimer = setInterval(() => {
                index = (index + 1) % rollImages.length;
                avatarCircle.innerHTML = `<img src="${rollImages[index]}" alt="抽奖头像">`;
            }, rollSpeed);
        } else {
            isRolling = false;
            clearInterval(rollTimer);
            drawBtn.disabled = true;
            drawBtn.innerText = "抽奖完成";

            avatarCircle.innerHTML = `<img src="${winnerConfig.image}" alt="中奖头像">`;
            hintText.innerText = `恭喜 ${winnerConfig.name} 中奖！`;

            const li = document.createElement('li');
            li.className = 'winner-item';
            li.innerHTML = `<img src="${winnerConfig.image}" alt=""><span>${winnerConfig.name}</span>`;
            winnerList.prepend(li);
        }
    };
</script>
</body>
</html>
