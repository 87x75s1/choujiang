<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运抽电动车</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #fff;
        }
        .title {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: #fff;
            border: none;
            font-size: 18px;
            padding: 14px 45px;
            border-radius: 50px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:disabled {
            opacity: 0.7;
        }
        .result {
            font-size: 18px;
            margin-top: 25px;
            font-weight: bold;
            color: #2da44e;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛵</div>
        <h2 class="title">幸运抽电动车</h2>
        <p class="desc">扫码参与活动，即有机会赢取电动车大奖！</p>
        <button class="btn" id="drawBtn">点击参与抽奖</button>
        <div class="result" id="successTip">✅ 参与成功！结果将统一公布，感谢参与！</div>
    </div>

    <script>
        const btn = document.getElementById('drawBtn');
        const tip = document.getElementById('successTip');

        btn.addEventListener('click', () => {
            btn.disabled = true;
            btn.innerText = "抽奖中...";

            setTimeout(() => {
                btn.style.display = "none";
                tip.style.display = "block";
            }, 800);
        });
    </script>
</body>
</html>
