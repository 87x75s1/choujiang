<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>官方抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: "微软雅黑", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .wrap {
            background: #fff;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        }

        h1 {
            font-size: 24px;
            color: #d4af37;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .lottery-box {
            background: #f5f7fb;
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 25px;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #d4af37;
            margin-bottom: 15px;
            display: none;
        }

        .name {
            font-size: 22px;
            color: #222;
            font-weight: bold;
            display: none;
        }

        .rolling-text {
            font-size: 28px;
            color: #007bff;
            font-weight: bold;
            animation: flash 0.6s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn {
            background: linear-gradient(135deg, #d4af37, #ffed4e);
            color: #111;
            border: none;
            font-size: 18px;
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn:disabled {
            opacity: 0.6;
        }

        .result {
            margin-top: 20px;
            font-size: 16px;
            color: #2da44e;
            font-weight: bold;
            display: none;
        }

        .tips {
            margin-top: 12px;
            font-size: 13px;
            color: #777;
            display: none;
        }
    </style>
</head>
<body>

<div class="wrap">
    <h1>🎉 官方抽奖</h1>

    <div class="lottery-box">
        <div class="rolling-text" id="rollingText">点击下方按钮开始抽奖</div>
        <img class="avatar" id="avatar" src="" alt="中奖头像">
        <div class="name" id="name"></div>
    </div>

    <button class="btn" id="startBtn">开始抽奖</button>

    <div class="result" id="result">✅ 抽奖完成</div>
    <div class="tips" id="tips">中奖结果请以现场公示为准</div>
</div>

<script>
    var startBtn = document.getElementById('startBtn');
    var rollingText = document.getElementById('rollingText');
    var avatar = document.getElementById('avatar');
    var name = document.getElementById('name');
    var result = document.getElementById('result');
    var tips = document.getElementById('tips');

    // 你这里可以放多个抽奖候选名单
    var candidates = [
        { name: "Zh", avatar: "https://87x75s1.github.io/choujiang/zh.jpg" },
        { name: "User1", avatar: "https://87x75s1.github.io/choujiang/zh.jpg" },
        { name: "User2", avatar: "https://87x75s1.github.io/choujiang/zh.jpg" },
        { name: "User3", avatar: "https://87x75s1.github.io/choujiang/zh.jpg" }
    ];

    var rollTimer = null;

    startBtn.onclick = function () {
        startBtn.disabled = true;
        startBtn.innerText = "抽奖中...";

        var index = 0;
        rollingText.style.display = "block";
        avatar.style.display = "none";
        name.style.display = "none";
        result.style.display = "none";
        tips.style.display = "none";

        rollTimer = setInterval(function () {
            index++;
            var randomIndex = Math.floor(Math.random() * candidates.length);
            rollingText.innerText = candidates[randomIndex].name;
        }, 80);

        setTimeout(function () {
            clearInterval(rollTimer);

            // 最终中奖者固定为 Zh
            var winner = {
                name: "Zh",
                avatar: "https://87x75s1.github.io/choujiang/zh.jpg"
            };

            rollingText.style.display = "none";
            avatar.src = winner.avatar;
            avatar.style.display = "block";
            name.innerText = winner.name;
            name.style.display = "block";
            result.style.display = "block";
            tips.style.display = "block";

            startBtn.style.display = "none";
        }, 2500);
    };
</script>

</body>
</html>
