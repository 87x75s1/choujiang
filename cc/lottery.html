<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>活动参与</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: linear-gradient(120deg, #ff9500, #ff5e3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrap {
            background: #fff;
            width: 100%;
            max-width: 360px;
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #ff9500;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #ff9500;
        }
        .title {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
        }
        .btn {
            background: #ff9500;
            color: #fff;
            border: none;
            font-size: 18px;
            padding: 14px 45px;
            border-radius: 50px;
            cursor: pointer;
        }
        .btn:disabled {
            background: #ccc;
        }
        .result {
            font-size: 18px;
            margin-top: 25px;
            font-weight: bold;
            color: #2da44e;
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="avatar">🎁</div>
        <h2 class="title">活动参与</h2>
        <button class="btn" id="joinBtn">立即参与抽奖</button>
        <div class="result" id="successTip">✅ 参与成功！感谢参与，结果统一公示</div>
    </div>
    <script>
        const btn = document.getElementById('joinBtn');
        const tip = document.getElementById('successTip');
        btn.onclick = () => {
            btn.disabled = true;
            btn.innerText = "参与中...";
            setTimeout(() => {
                btn.style.display = "none";
                tip.style.display = "block";
            }, 800);
        }
    </script>
</body>
</html>
